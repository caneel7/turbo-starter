name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY }}

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            dockerfile: apps/backend/Dockerfile
            image: turbo-starter-backend
          - app: queues
            dockerfile: apps/queues/Dockerfile
            image: turbo-starter-queues
          - app: web
            dockerfile: apps/web/Dockerfile
            image: turbo-starter-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ matrix.app == 'web' && secrets.WEB_URL || '' }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --workspace=packages/database

      - name: Run migrations
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: npx prisma migrate deploy

  deploy:
    name: Trigger Dokploy redeploy
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]

    steps:
      - name: Redeploy backend
        run: |
          curl -sf -X GET "${{ secrets.DOKPLOY_BACKEND_WEBHOOK }}" \
            || echo "backend redeploy failed or not configured, skipping"

      - name: Redeploy queues
        run: |
          curl -sf -X GET "${{ secrets.DOKPLOY_QUEUES_WEBHOOK }}" \
            || echo "queues redeploy failed or not configured, skipping"

      - name: Redeploy web
        run: |
          curl -sf -X GET "${{ secrets.DOKPLOY_WEB_WEBHOOK }}" \
            || echo "web redeploy failed or not configured, skipping"
